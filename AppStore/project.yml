name: TranslateStore
options:
  deploymentTarget:
    macOS: "15.0"
packages:
  TranslateCore:
    path: ..
targets:
  TranslateStore:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: TranslateCore
        product: TranslateCore
    entitlements:
      path: TranslateStore.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: Translate
        PRODUCT_BUNDLE_IDENTIFIER: com.notfluentyet.translate
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Used to convert your speech into text before translating it."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Used to convert your speech into text before translating it."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
